# ??????????? ?????????? ????? .env (???? ?? ????)
spring.config.import=optional:file:.env[.properties]
# APPLICATION SETTINGS
spring.application.name=effitrack-server
server.port=${PORT:8080}
# DATABASE CONFIGURATION (MySQL)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ????????? localhost ?? ?????????, ?? ??? ?????? ?? Render ???? ??????????? ???????? ?????? ?? ?????????? DB_URL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/effitrack_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD}
# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# SECURITY (JWT)
effitrack.app.secret=${JWT_SECRET}
effitrack.app.expirationMs=${JWT_EXPIRATION:86400000}
# EMAIL SETTINGS (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USER}
spring.mail.password=${EMAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000
# APP
app.master.pin=${MASTER_PIN_CODE}